<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nettó migrációs ráták – Európa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b27;
    --surface2: #1e2535;
    --border: #2a3347;
    --accent: #4fc3f7;
    --accent2: #f06292;
    --text: #e8eaf0;
    --text-dim: #7a8599;
    --positive: #66bb6a;
    --negative: #ef5350;
    --font-display: 'DM Serif Display', serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Háttér minta */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(79,195,247,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(240,98,146,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  header {
    margin-bottom: 2.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
  }

  header h1 {
    font-family: var(--font-display);
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  header h1 em {
    color: var(--accent);
    font-style: italic;
  }

  header p {
    margin-top: 0.5rem;
    color: var(--text-dim);
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Szűrő panel */
  .filters {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
    align-items: start;
  }

  @media (max-width: 900px) {
    .filters { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 500px) {
    .filters { grid-template-columns: 1fr; }
  }

  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .filter-group label {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .filter-group select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.8rem;
    padding: 0.4rem 0.6rem;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .filter-group select[multiple] {
    height: 140px;
    overflow-y: auto;
  }

  .filter-group select:focus {
    border-color: var(--accent);
  }

  .filter-group select option {
    padding: 3px 6px;
    background: var(--surface2);
  }

  .filter-group select option:checked {
    background: var(--accent);
    color: #000;
  }

  /* Gombok */
  .controls {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
  }

  button {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.5rem 1.2rem;
    border-radius: 4px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 500;
  }
  .btn-primary:hover { background: #81d4fa; }

  .btn-secondary {
    background: transparent;
    color: var(--text-dim);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .citizen-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-left: auto;
  }

  .citizen-toggle button {
    border: none;
    border-radius: 0;
    background: var(--surface);
    color: var(--text-dim);
    padding: 0.5rem 1rem;
    font-size: 0.7rem;
  }

  .citizen-toggle button.active {
    background: var(--surface2);
    color: var(--accent);
    border-bottom: 2px solid var(--accent);
  }

  /* Megjelenítési mód */
  .mode-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .mode-row span {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-right: 0.25rem;
  }

  .mode-btn {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    padding: 0.35rem 0.9rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .mode-btn.active {
    background: var(--surface2);
    color: var(--accent);
    border-color: var(--accent);
  }

  /* Chart */
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 1rem;
    min-height: 500px;
  }

  #chart { width: 100%; height: 520px; }

  /* Státusz */
  .status {
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    margin-bottom: 1rem;
  }

  .status span { color: var(--accent); }

  /* Hint */
  .hint {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    margin-top: 0.3rem;
  }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 520px;
    color: var(--text-dim);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    gap: 0.75rem;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  select::-webkit-scrollbar { width: 4px; }
  select::-webkit-scrollbar-track { background: var(--surface); }
  select::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Nettó migrációs <em>ráták</em></h1>
    <p>Forrás: Eurostat MIGR_EMI1CTZ · MIGR_IMM1CTZ · DEMO_PJAN &nbsp;|&nbsp; Korcsoport-specifikus elemzés</p>
  </header>

  <div class="filters">
    <div class="filter-group">
      <label>Ország</label>
      <select id="sel-geo" multiple></select>
      <div class="hint">Ctrl+katt = több kijelölés</div>
    </div>
    <div class="filter-group">
      <label>Év</label>
      <select id="sel-year" multiple></select>
    </div>
    <div class="filter-group">
      <label>Korcsoport</label>
      <select id="sel-age" multiple></select>
    </div>
    <div class="filter-group">
      <label>Nem</label>
      <select id="sel-sex" multiple>
        <option value="M" selected>Férfi (M)</option>
        <option value="F" selected>Nő (F)</option>
        <option value="T" selected>Összes (T)</option>
      </select>
    </div>
  </div>

  <div class="controls">
    <button class="btn-primary" onclick="updateChart()">&#9654; Frissít</button>
    <button class="btn-secondary" onclick="selectAll('sel-geo')">Összes ország</button>
    <button class="btn-secondary" onclick="selectAll('sel-year')">Összes év</button>
    <button class="btn-secondary" onclick="selectAll('sel-age')">Összes korcsoport</button>
    <div class="citizen-toggle">
      <button id="btn-total" class="active" onclick="setCitizen('TOTAL')">Összes állampolgár</button>
      <button id="btn-rep" onclick="setCitizen('NAT')">Saját állampolgárok</button>
    </div>
  </div>

  <div class="mode-row">
    <span>Megjelenítés:</span>
    <button class="mode-btn active" id="mode-line" onclick="setMode('line')">Idősoros</button>
    <button class="mode-btn" id="mode-bar" onclick="setMode('bar')">Oszlopdiagram</button>
    <button class="mode-btn" id="mode-heatmap" onclick="setMode('heatmap')">Hőtérkép</button>
  </div>

  <div class="status" id="status">Adatok betöltése...</div>

  <div class="chart-wrap">
    <div id="chart">
      <div class="loading"><div class="spinner"></div> CSV betöltése...</div>
    </div>
  </div>
</div>

<script>
let allData = [];
let citizenFilter = 'Total';
let chartMode = 'line';

// Korcsoport sorrend
const AGE_ORDER = [
  "Less than 5 years","From 5 to 9 years","From 10 to 14 years",
  "From 15 to 19 years","From 20 to 24 years","From 25 to 29 years",
  "From 30 to 34 years","From 35 to 39 years","From 40 to 44 years",
  "From 45 to 49 years","From 50 to 54 years","From 55 to 59 years",
  "From 60 to 64 years","From 65 to 69 years","From 70 to 74 years",
  "From 75 to 79 years","From 80 to 84 years","From 85 to 89 years",
  "From 90 to 94 years","From 95 to 99 years","100 years or over"
];

const AGE_SHORT = {
  "Less than 5 years":"<5","From 5 to 9 years":"5–9","From 10 to 14 years":"10–14",
  "From 15 to 19 years":"15–19","From 20 to 24 years":"20–24","From 25 to 29 years":"25–29",
  "From 30 to 34 years":"30–34","From 35 to 39 years":"35–39","From 40 to 44 years":"40–44",
  "From 45 to 49 years":"45–49","From 50 to 54 years":"50–54","From 55 to 59 years":"55–59",
  "From 60 to 64 years":"60–64","From 65 to 69 years":"65–69","From 70 to 74 years":"70–74",
  "From 75 to 79 years":"75–79","From 80 to 84 years":"80–84","From 85 to 89 years":"85–89",
  "From 90 to 94 years":"90–94","From 95 to 99 years":"95–99","100 years or over":"100+"
};

// Plotly layout alap
const layoutBase = {
  paper_bgcolor: 'rgba(0,0,0,0)',
  plot_bgcolor: 'rgba(0,0,0,0)',
  font: { family: 'DM Mono, monospace', color: '#e8eaf0', size: 11 },
  xaxis: { gridcolor: '#2a3347', zerolinecolor: '#2a3347', tickfont: { size: 10 } },
  yaxis: { gridcolor: '#2a3347', zerolinecolor: '#4fc3f7', tickformat: '.2%', tickfont: { size: 10 } },
  legend: { bgcolor: 'rgba(22,27,39,0.8)', bordercolor: '#2a3347', borderwidth: 1, font: { size: 10 } },
  margin: { t: 40, r: 20, b: 60, l: 70 },
  hovermode: 'closest',
};

const config = { responsive: true, displayModeBar: false };

// Színpaletta
const COLORS = [
  '#4fc3f7','#f06292','#66bb6a','#ffb74d','#ce93d8','#80cbc4',
  '#ff8a65','#90caf9','#a5d6a7','#fff176','#ef9a9a','#80deea'
];

function getColor(i) { return COLORS[i % COLORS.length]; }

// Segédfüggvények
function getSelected(id) {
  return Array.from(document.getElementById(id).selectedOptions).map(o => o.value);
}

function selectAll(id) {
  const sel = document.getElementById(id);
  Array.from(sel.options).forEach(o => o.selected = true);
}

function setCitizen(val) {
  citizenFilter = val;
  document.getElementById('btn-total').classList.toggle('active', val === 'TOTAL');
  document.getElementById('btn-rep').classList.toggle('active', val === 'NAT');
  updateChart();
}

function setMode(mode) {
  chartMode = mode;
  ['line','bar','heatmap'].forEach(m => {
    document.getElementById('mode-'+m).classList.toggle('active', m === mode);
  });
  updateChart();
}

function populateSelects(data) {
  const geos  = [...new Set(data.map(d => d.geo_iso))].sort();
  const years = [...new Set(data.map(d => d.TIME_PERIOD))].sort();
  const ages  = AGE_ORDER.filter(a => new Set(data.map(d => d.age_group)).has(a));

  function fill(id, vals, defaultAll) {
    const sel = document.getElementById(id);
    sel.innerHTML = '';
    vals.forEach(v => {
      const o = document.createElement('option');
      o.value = v;
      o.textContent = (id === 'sel-age') ? (AGE_SHORT[v] || v) + '  (' + v + ')' : v;
      if (defaultAll) o.selected = true;
      sel.appendChild(o);
    });
  }

  fill('sel-geo',  geos,  false);
  fill('sel-year', years, true);
  fill('sel-age',  ages,  true);

  // Default: HU kijelölve, ha van
  const geoSel = document.getElementById('sel-geo');
  Array.from(geoSel.options).forEach(o => { if (o.value === 'HU') o.selected = true; });
}

function filterData() {
  const geos  = new Set(getSelected('sel-geo'));
  const years = new Set(getSelected('sel-year').map(Number));
  const ages  = new Set(getSelected('sel-age'));
  const sexes = new Set(getSelected('sel-sex'));

  return allData.filter(d =>
    d.citizen === citizenFilter &&
    geos.has(d.geo_iso) &&
    years.has(d.TIME_PERIOD) &&
    ages.has(d.age_group) &&
    sexes.has(d.sex)
  );
}

function updateChart() {
  const data = filterData();
  document.getElementById('status').innerHTML =
    `Megjelenített sorok: <span>${data.length}</span> | Citizen: <span>${citizenFilter}</span>`;

  if (data.length === 0) {
    Plotly.purge('chart');
    document.getElementById('chart').innerHTML =
      '<div class="loading">Nincs adat a kiválasztott szűrőkkel</div>';
    return;
  }

  if (chartMode === 'line') drawLine(data);
  else if (chartMode === 'bar') drawBar(data);
  else drawHeatmap(data);
}

function drawLine(data) {
  // X: év, görbék: geo+sex+age kombók
  const keys = [...new Set(data.map(d => `${d.geo_iso}|${d.sex}|${AGE_SHORT[d.age_group]||d.age_group}`))].sort();
  const traces = keys.map((key, i) => {
    const [geo, sex, age] = key.split('|');
    const rows = data
      .filter(d => d.geo_iso === geo && d.sex === sex && (AGE_SHORT[d.age_group]||d.age_group) === age)
      .sort((a,b) => a.TIME_PERIOD - b.TIME_PERIOD);
    return {
      x: rows.map(d => d.TIME_PERIOD),
      y: rows.map(d => d.net_migration_rate),
      type: 'scatter', mode: 'lines+markers',
      name: `${geo} ${sex} ${age}`,
      line: { color: getColor(i), width: 2 },
      marker: { size: 5, color: getColor(i) },
      hovertemplate: `<b>${geo} · ${sex} · ${age}</b><br>Év: %{x}<br>Ráta: %{y:.3%}<extra></extra>`
    };
  });

  const layout = { ...layoutBase,
    title: { text: 'Nettó migrációs ráta – idősoros', font: { size: 13, color: '#e8eaf0' } },
    xaxis: { ...layoutBase.xaxis, dtick: 1, title: { text: 'Év', font: { size: 10 } } },
    yaxis: { ...layoutBase.yaxis, title: { text: 'Nettó ráta', font: { size: 10 } } },
    shapes: [{ type: 'line', x0: 0, x1: 1, xref: 'paper', y0: 0, y1: 0,
      line: { color: '#4fc3f7', width: 1, dash: 'dot' } }]
  };

  Plotly.react('chart', traces, layout, config);
}

function drawBar(data) {
  // Csoportos oszlop: X = korcsoport, csoportok = geo+sex
  const ages = AGE_ORDER.filter(a => new Set(data.map(d => d.age_group)).has(a));
  const combos = [...new Set(data.map(d => `${d.geo_iso}|${d.sex}`))].sort();

  const traces = combos.map((combo, i) => {
    const [geo, sex] = combo.split('|');
    const rows = data.filter(d => d.geo_iso === geo && d.sex === sex);
    // átlag évek szerint
    const byAge = {};
    rows.forEach(d => {
      if (!byAge[d.age_group]) byAge[d.age_group] = [];
      byAge[d.age_group].push(d.net_migration_rate);
    });
    return {
      x: ages.map(a => AGE_SHORT[a] || a),
      y: ages.map(a => byAge[a] ? byAge[a].reduce((s,v)=>s+v,0)/byAge[a].length : null),
      type: 'bar',
      name: `${geo} ${sex}`,
      marker: { color: getColor(i), opacity: 0.85 },
      hovertemplate: `<b>${geo} · ${sex}</b><br>Korcsoport: %{x}<br>Átl. ráta: %{y:.3%}<extra></extra>`
    };
  });

  const layout = { ...layoutBase,
    title: { text: 'Nettó migrációs ráta – korcsoportonként (évek átlaga)', font: { size: 13, color: '#e8eaf0' } },
    barmode: 'group',
    xaxis: { ...layoutBase.xaxis, title: { text: 'Korcsoport', font: { size: 10 } } },
    yaxis: { ...layoutBase.yaxis, title: { text: 'Átlagos nettó ráta', font: { size: 10 } } },
  };

  Plotly.react('chart', traces, layout, config);
}

function drawHeatmap(data) {
  // Hőtérkép: X = korcsoport, Y = geo+sex+év, Z = ráta
  const ages = AGE_ORDER.filter(a => new Set(data.map(d => d.age_group)).has(a));
  const rows = [...new Set(data.map(d => `${d.geo_iso}·${d.sex}·${d.TIME_PERIOD}`))].sort();

  const z = rows.map(row => {
    const [geo, sex, yr] = row.split('·');
    return ages.map(age => {
      const match = data.find(d =>
        d.geo_iso === geo && d.sex === sex &&
        d.TIME_PERIOD === Number(yr) && d.age_group === age
      );
      return match ? match.net_migration_rate : null;
    });
  });

  const trace = {
    type: 'heatmap',
    x: ages.map(a => AGE_SHORT[a] || a),
    y: rows,
    z: z,
    colorscale: [
      [0, '#ef5350'], [0.4, '#1e2535'], [0.5, '#1e2535'], [0.6, '#1e2535'], [1, '#66bb6a']
    ],
    zmid: 0,
    colorbar: {
      tickformat: '.1%', thickness: 12,
      tickfont: { size: 9, color: '#e8eaf0' },
      bgcolor: 'rgba(0,0,0,0)', bordercolor: '#2a3347'
    },
    hovertemplate: 'Sor: %{y}<br>Kor: %{x}<br>Ráta: %{z:.3%}<extra></extra>'
  };

  const layout = { ...layoutBase,
    title: { text: 'Nettó migrációs ráta – hőtérkép', font: { size: 13, color: '#e8eaf0' } },
    xaxis: { ...layoutBase.xaxis, title: { text: 'Korcsoport', font: { size: 10 } } },
    yaxis: { gridcolor: '#2a3347', tickfont: { size: 9 }, automargin: true },
    margin: { t: 40, r: 80, b: 80, l: 140 },
    height: Math.max(520, rows.length * 22 + 100)
  };

  document.getElementById('chart').style.height = layout.height + 'px';
  Plotly.react('chart', [trace], layout, config);
}

// CSV betöltés
function loadCSV() {
  Papa.parse('net_migration_rates_v7.csv', {
    download: true,
    header: true,
    delimiter: ';',
    dynamicTyping: true,
    complete: function(results) {
      allData = results.data.filter(d => d.geo_iso && d.net_migration_rate != null);
      populateSelects(allData);
      updateChart();
    },
    error: function(err) {
      document.getElementById('chart').innerHTML =
        `<div class="loading" style="color:#ef5350">CSV betöltési hiba: ${err.message}<br><br>
        <span style="font-size:0.7rem;color:#7a8599">Helyezd a net_migration_rates_v4.csv fájlt ugyanebbe a mappába mint ez a HTML fájl.</span></div>`;
    }
  });
}

loadCSV();
</script>
</body>
</html>
